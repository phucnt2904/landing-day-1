<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khảo sát nhu cầu - Nomie 💌</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rose:       #c9707a;
      --rose-dark:  #b05a63;
      --rose-light: #f0a8b0;
      --rose-pale:  #f8d8de;
      --blush:      #fde8ec;
      --cream:      #fdf6f8;
      --text:       #3a2a2e;
      --muted:      #9a7e84;
      --border:     #f0d8de;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background-color: #fde4ea;
      background-image:
        radial-gradient(ellipse at 10% 20%, rgba(255,200,215,.55) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(220,140,165,.4) 0%, transparent 50%),
        radial-gradient(ellipse at 55% 5%,  rgba(255,220,230,.45) 0%, transparent 45%);
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────── */
    header {
      background: rgba(253,228,234,.93);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--rose-pale);
      height: 64px; padding: 0 24px;
    }
    .header-inner {
      max-width: 760px; margin: 0 auto;
      height: 100%; display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 2.1rem; font-weight: 700;
      color: var(--rose); text-decoration: none;
    }
    .back-link {
      font-size: .85rem; font-weight: 600; color: var(--rose);
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .back-link:hover { color: var(--rose-dark); }

    /* ── CONTAINER ──────────────────────────── */
    .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px; flex: 1; }

    /* ── CARD ───────────────────────────────── */
    .card {
      background: var(--cream); border-radius: 28px;
      padding: 48px 40px; box-shadow: 0 2px 24px rgba(180,80,100,.07);
    }

    /* ── SECTION HEAD ───────────────────────── */
    .sec-head { text-align: center; margin-bottom: 40px; }
    .script-label {
      font-family: 'Dancing Script', cursive;
      font-size: 1.6rem; font-weight: 600;
      color: var(--rose); display: block; margin-bottom: 4px;
    }
    .sec-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      font-weight: 700; line-height: 1.22; color: var(--text); margin-bottom: 12px;
    }
    .sec-desc { font-size: .95rem; color: var(--muted); max-width: 460px; margin: 0 auto; line-height: 1.72; }

    /* ── FORM ───────────────────────────────── */
    .order-form { max-width: 600px; margin: 0 auto; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
    .form-group label { font-size: .86rem; font-weight: 600; color: var(--text); }
    .form-group input, .form-group textarea {
      border: 1.5px solid var(--border); border-radius: 12px;
      padding: 12px 15px; font-size: .9rem; font-family: 'Inter', sans-serif;
      color: var(--text); background: #fff; outline: none; resize: vertical;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--rose); box-shadow: 0 0 0 3px rgba(201,112,122,.1);
    }
    .form-group input::placeholder, .form-group textarea::placeholder { color: #c9aeb4; }
    .btn-submit {
      width: 100%; background: var(--rose); color: #fff; border: none;
      border-radius: 50px; padding: 15px; font-size: .97rem; font-weight: 700;
      cursor: pointer; margin-top: 6px;
      box-shadow: 0 6px 20px rgba(201,112,122,.35);
      transition: background .2s, transform .2s;
    }
    .btn-submit:hover { background: var(--rose-dark); transform: translateY(-2px); }
    .form-success { max-width: 600px; margin: 0 auto; text-align: center; padding: 48px 24px; }
    .success-icon { font-size: 3rem; margin-bottom: 16px; }
    .form-success h3 {
      font-family: 'Dancing Script', cursive;
      font-size: 2.2rem; color: var(--text); margin-bottom: 12px;
    }
    .form-success p { font-size: .95rem; color: var(--muted); line-height: 1.75; }

    .survey-options { display: flex; flex-direction: column; gap: 9px; }
    .opt-radio, .opt-check {
      display: flex; align-items: center; gap: 10px;
      font-size: .88rem; color: var(--text); cursor: pointer;
      background: #fff; border: 1.5px solid var(--border); border-radius: 12px;
      padding: 11px 16px; transition: border-color .2s, background .2s;
    }
    .opt-radio:hover, .opt-check:hover { border-color: var(--rose-light); background: var(--blush); }
    .opt-radio input, .opt-check input { accent-color: var(--rose); width: 17px; height: 17px; flex-shrink: 0; }

    /* ── SURVEY COLLAPSE ────────────────────── */
    .survey-toggle {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; background: var(--blush); color: var(--rose-dark);
      border: 1.5px dashed var(--rose-light); border-radius: 50px;
      padding: 12px 16px; font-size: .86rem; font-weight: 700; cursor: pointer;
      margin-bottom: 16px; transition: background .2s, color .2s;
    }
    .survey-toggle:hover { background: var(--rose); color: #fff; }
    .survey-toggle .toggle-arr { transition: transform .25s; font-size: .8rem; }
    .survey-toggle.open .toggle-arr { transform: rotate(180deg); }
    .survey-collapse { overflow: hidden; max-height: 0; transition: max-height .45s ease; }
    .survey-collapse.open { max-height: 2400px; }

    footer { text-align: center; padding: 24px; font-size: .8rem; color: var(--muted); }

    @media (max-width: 540px) {
      .card { padding: 36px 22px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <a href="#" class="logo">Nomie</a>
      <a href="index.html" class="back-link">← Về trang chủ</a>
    </div>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="sec-head">
        <span class="script-label">Đăng ký nhận sớm</span>
        <h2 class="sec-title">Khảo Sát Nhu Cầu 💌</h2>
        <p class="sec-desc">Để lại thông tin và chia sẻ vài điều nho nhỏ — Nomie sẽ ưu tiên nhắn bạn trước khi có gì mới nhé!</p>
      </div>
      <form id="surveyForm" class="order-form"
            action="https://script.google.com/macros/s/AKfycbze5zmdQ3C5pDyKGIP0YyYIKGWuAzep_5qsAwokxDrU63CInB-Ry_iGKuxJEHgzRTJrBg/exec"
            method="post"
            target="hidden_iframe_survey"
            onsubmit="prepSurveySubmit()">
        <input type="hidden" name="formType" value="khao_sat" />

        <div class="form-row">
          <div class="form-group">
            <label>Bạn tên gì để shop tiện xưng hô nha? 💕</label>
            <input type="text" name="khaoSatTen" placeholder="" />
          </div>
          <div class="form-group">
            <label>Số điện thoại/Zalo của bạn?</label>
            <input type="tel" name="khaoSatSdtZalo" placeholder="vd: 09x xxx xxxx" />
          </div>
        </div>
        <button type="button" class="survey-toggle" id="surveyToggle" onclick="toggleSurveyForm()">
          <span>Xem thêm vài câu nho nhỏ nữa nha</span><span class="toggle-arr">⌄</span>
        </button>

        <div class="survey-collapse" id="surveyCollapse">
        <div class="form-row">
          <div class="form-group">
            <label>Instagram của bạn? *</label>
            <input type="text" name="khaoSatInstagram" placeholder="vd: nomie.order" required />
          </div>
          <div class="form-group">
            <label>Email của bạn? *</label>
            <input type="email" name="khaoSatEmail" placeholder="vd: nomie@gmail.com" required />
          </div>
        </div>

        <div class="form-group">
          <label>Bạn đã từng order hàng Taobao qua trung gian/shop order hộ chưa?</label>
          <div class="survey-options">
            <label class="opt-radio"><input type="radio" name="khaoSatDaTungOrder" value="Chưa từng" /> Chưa từng</label>
            <label class="opt-radio"><input type="radio" name="khaoSatDaTungOrder" value="Đã từng, nhưng không hài lòng" /> Đã từng, nhưng không hài lòng</label>
            <label class="opt-radio"><input type="radio" name="khaoSatDaTungOrder" value="Đã từng và khá ổn" /> Đã từng và khá ổn</label>
          </div>
        </div>

        <div class="form-group">
          <label>Bạn biết đến Nomie qua đâu?</label>
          <div class="survey-options">
            <label class="opt-radio"><input type="radio" name="khaoSatBietQua" value="Instagram" /> Instagram</label>
            <label class="opt-radio"><input type="radio" name="khaoSatBietQua" value="Bạn bè giới thiệu" /> Bạn bè giới thiệu</label>
            <label class="opt-radio"><input type="radio" name="khaoSatBietQua" value="TikTok" /> TikTok</label>
            <label class="opt-radio"><input type="radio" name="khaoSatBietQua" value="Khác" /> Khác</label>
          </div>
        </div>

        <div class="form-group">
          <label>Bạn quan tâm nhất loại sản phẩm nào?</label>
          <div class="survey-options">
            <label class="opt-radio"><input type="radio" name="khaoSatSanPham" value="Quần áo" /> Quần áo</label>
            <label class="opt-radio"><input type="radio" name="khaoSatSanPham" value="Giày dép" /> Giày dép</label>
            <label class="opt-radio"><input type="radio" name="khaoSatSanPham" value="Phụ kiện (túi, trang sức, mũ...)" /> Phụ kiện (túi, trang sức, mũ...)</label>
            <label class="opt-radio"><input type="radio" name="khaoSatSanPham" value="Tất cả luôn 🤩" /> Tất cả luôn 🤩</label>
          </div>
        </div>

        <div class="form-group">
          <label>Điều gì đang cản bước bạn khi order hàng từ Taobao?</label>
          <div class="survey-options">
            <label class="opt-check"><input type="checkbox" class="canTroChk" value="Phí dịch vụ cao" /> Phí dịch vụ cao</label>
            <label class="opt-check"><input type="checkbox" class="canTroChk" value="Ship chờ lâu" /> Ship chờ lâu</label>
            <label class="opt-check"><input type="checkbox" class="canTroChk" value="Không tìm được cái mình cần" /> Không tìm được cái mình cần</label>
            <label class="opt-check"><input type="checkbox" class="canTroChk" value="Lo về size, form,..." /> Lo về size, form,...</label>
            <label class="opt-check"><input type="checkbox" class="canTroChk" value="Sợ hàng thật khác với hình" /> Sợ hàng thật khác với hình</label>
            <label class="opt-check"><input type="checkbox" class="canTroChk" value="Không biết tiếng Trung" /> Không biết tiếng Trung</label>
          </div>
          <input type="hidden" name="khaoSatCanTro" id="khaoSatCanTro" />
        </div>

        <div class="form-group">
          <label>Mức giá bạn thường chi cho 1 món đồ là khoảng bao nhiêu?</label>
          <div class="survey-options">
            <label class="opt-radio"><input type="radio" name="khaoSatMucGia" value="Dưới 200k" /> Dưới 200k</label>
            <label class="opt-radio"><input type="radio" name="khaoSatMucGia" value="200k - 500k" /> 200k - 500k</label>
            <label class="opt-radio"><input type="radio" name="khaoSatMucGia" value="500k - 1 triệu" /> 500k - 1 triệu</label>
            <label class="opt-radio"><input type="radio" name="khaoSatMucGia" value="Trên 1 triệu" /> Trên 1 triệu</label>
          </div>
        </div>

        <button type="submit" class="btn-submit" onclick="showSurveySuccess()">Gửi cho Nomie 💕</button>
        </div>
      </form>
      <iframe name="hidden_iframe_survey" style="display:none"></iframe>
      <div id="surveyFormSuccess" class="form-success" style="display:none;">
        <div class="success-icon">💕</div>
        <h3>Cảm ơn bạn!</h3>
        <p>Nomie đã nhận được thông tin của bạn rồi. Cảm ơn bạn đã dành thời gian chia sẻ nhé! 🥰</p>
      </div>
    </div>
  </div>

  <footer>© Nomie — Order hộ Taobao ✦</footer>

  <script>
    function prepSurveySubmit() {
      var checked = document.querySelectorAll('#surveyForm .canTroChk:checked');
      var labels = [];
      checked.forEach(function(cb) { labels.push(cb.value); });
      document.getElementById('khaoSatCanTro').value = labels.join(', ');
    }

    function showSurveySuccess() {
      setTimeout(function() {
        document.getElementById('surveyForm').style.display = 'none';
        document.getElementById('surveyFormSuccess').style.display = 'block';
      }, 800);
    }

    function toggleSurveyForm() {
      document.getElementById('surveyCollapse').classList.toggle('open');
      document.getElementById('surveyToggle').classList.toggle('open');
    }
  </script>

</body>
</html>
